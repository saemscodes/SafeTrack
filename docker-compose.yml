version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: safetrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/safetrack
      JWT_SECRET: change-me-in-production
      JWT_REFRESH_SECRET: change-me-refresh
      PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: "*"
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    volumes:
      - ./web-client:/app/web-client

volumes:
  pgdata:
